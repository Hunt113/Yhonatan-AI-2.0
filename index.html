<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a3a 0%, #0d0d1a 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .game-container {
            background: rgba(20, 20, 40, 0.6);
            border: 2px solid #00d2ff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 450px;
            width: 90%;
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00d2ff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
            height: 30px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: #00d2ff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: inset 0 0 15px rgba(0, 210, 255, 0.5);
        }

        .cell {
            background-color: #0d0d1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cell:hover {
            background-color: #161632;
        }

        /* X Marker Styling */
        .cell .x-mark {
            width: 65px;
            height: 65px;
            position: relative;
            filter: drop-shadow(0 0 8px #39ff14);
        }

        .cell .x-mark::before, .cell .x-mark::after {
            content: '';
            position: absolute;
            background-color: #39ff14;
            border-radius: 4px;
            top: 50%;
            left: 50%;
        }

        .cell .x-mark::before {
            width: 65px;
            height: 12px;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .cell .x-mark::after {
            width: 12px;
            height: 65px;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* O Marker Styling */
        .cell .o-mark {
            width: 60px;
            height: 60px;
            border: 12px solid #ff9900;
            border-radius: 50%;
            filter: drop-shadow(0 0 8px #ff9900);
        }

        .scoreboard {
            display: flex;
            width: 100%;
            gap: 15px;
            justify-content: space-between;
        }

        .score-box {
            flex: 1;
            background: rgba(13, 13, 26, 0.8);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-box.x-box { border-color: #39ff14; }
        .score-box.o-box { border-color: #ff9900; }

        .player-label {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .x-box .player-label { color: #39ff14; }
        .o-box .player-label { color: #ff9900; }

        .score-count {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .action-btn {
            background: transparent;
            color: #ffffff;
            border: 2px solid #00d2ff;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
            width: 100%;
        }

        .action-btn:hover {
            background: #00d2ff;
            color: #0d0d1a;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* Winning Line Highlights */
        .cell.winner-cell {
            background-color: rgba(0, 210, 255, 0.15);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 5px rgba(0, 210, 255, 0.5); }
            to { box-shadow: 0 0 15px rgba(0, 210, 255, 0.8); }
        }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>

    <div class="game-container">
        <div class="status-text" id="statusField">Your turn (X)...</div>

        <div class="board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="scoreboard">
            <div class="score-box x-box">
                <div class="player-label"><span>✕</span> Player (X)</div>
                <div class="score-count" id="scoreX">0</div>
            </div>
            <div class="score-box o-box">
                <div class="player-label"><span>◯</span> AI (O)</div>
                <div class="score-count" id="scoreO">0</div>
            </div>
        </div>

        <button class="action-btn" onclick="resetBoard()">New Game</button>
    </div>

    <script>
        const board = document.getElementById('gameBoard');
        const cells = document.querySelectorAll('.cell');
        const statusField = document.getElementById('statusField');
        const scoreXField = document.getElementById('scoreX');
        const scoreOField = document.getElementById('scoreO');

        let gridState = ["", "", "", "", "", "", "", "", ""];
        let isGameActive = true;
        let playerWins = 0;
        let aiWins = 0;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        cells.forEach(cell => cell.addEventListener('click', handleUserTurn));

        function handleUserTurn(e) {
            const clickedCell = e.target;
            const index = parseInt(clickedCell.getAttribute('data-index'));

            if (gridState[index] !== "" || !isGameActive) return;

            makeMove(index, "X");

            if (checkWin("X")) {
                endGame("Player (X) Wins!", "X");
                return;
            }

            if (gridState.includes("")) {
                isGameActive = false; // Temporarily lock board during AI decision
                statusField.innerText = "AI is thinking...";
                setTimeout(handleAiTurn, 500);
            } else {
                endGame("It's a Tie!", "Tie");
            }
        }

        function handleAiTurn() {
            // Smart AI Logic (Checks win, blocks user, or plays center/random)
            let bestMove = findStrategicMove("O") || findStrategicMove("X") || findOpenCenter() || findRandomMove();
            
            if (bestMove !== null) {
                makeMove(bestMove, "O");
                isGameActive = true;

                if (checkWin("O")) {
                    endGame("AI (O) Wins!", "O");
                    return;
                }

                if (!gridState.includes("")) {
                    endGame("It's a Tie!", "Tie");
                    return;
                }

                statusField.innerText = "Your turn (X)...";
            }
        }

        function makeMove(index, marker) {
            gridState[index] = marker;
            const element = document.createElement('div');
            element.className = marker === "X" ? "x-mark" : "o-mark";
            cells[index].appendChild(element);
        }

        function findStrategicMove(marker) {
            for (let condition of winConditions) {
                const values = condition.map(idx => gridState[idx]);
                const count = values.filter(val => val === marker).length;
                const emptyCount = values.filter(val => val === "").length;

                if (count === 2 && emptyCount === 1) {
                    return condition[values.indexOf("")];
                }
            }
            return null;
        }

        function findOpenCenter() {
            return gridState[4] === "" ? 4 : null;
        }

        function findRandomMove() {
            const emptyIndices = gridState.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
            return emptyIndices.length > 0 ? emptyIndices[Math.floor(Math.random() * emptyIndices.length)] : null;
        }

        function checkWin(marker) {
            return winConditions.some(condition => {
                const win = condition.every(index => gridState[index] === marker);
                if (win) {
                    highlightWinners(condition);
                }
                return win;
            });
        }

        function highlightWinners(indices) {
            indices.forEach(idx => cells[idx].classList.add('winner-cell'));
        }

        function endGame(message, winner) {
            isGameActive = false;
            statusField.innerText = message;

            if (winner === "X") {
                playerWins++;
                scoreXField.innerText = playerWins;
            } else if (winner === "O") {
                aiWins++;
                scoreOField.innerText = aiWins;
            }
        }

        function resetBoard() {
            gridState = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            statusField.innerText = "Your turn (X)...";
            cells.forEach(cell => {
                cell.innerHTML = "";
                cell.classList.remove('winner-cell');
            });
        }
    </script>
</body>
</html>
